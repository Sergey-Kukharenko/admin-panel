server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the transcription orchestrator (in-cluster)
    location /api/ {
        proxy_pass http://mico-transcription-orchestrator-service.proj-transcription.svc.cluster.local:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout                 600s;
        proxy_send_timeout                 600s;
        client_max_body_size               1024m;
    }

    # Cache hashed build assets aggressively (Vite emits content-hashed filenames)
    location ~* \.(js|mjs|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — serve index.html for any client-side route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry HTML
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Liveness/readiness probe
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
